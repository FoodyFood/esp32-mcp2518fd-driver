[platformio]
build_cache_dir = ../../.cache

[env:node_a]
platform        = espressif32@7.0.1
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_port     = COM4
lib_deps        = file://../..
build_flags     = -DNODE_SID=0x100

[env:node_b]
platform        = espressif32@7.0.1
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_port     = COM3
lib_deps        = file://../..
build_flags     = -DNODE_SID=0x200

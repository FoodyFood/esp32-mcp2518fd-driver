[common]
platform      = espressif32@7.0.1
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_port   = COM4

[env:loopback]
platform         = ${common.platform}
board            = ${common.board}
framework        = ${common.framework}
monitor_speed    = ${common.monitor_speed}
upload_port      = ${common.upload_port}
build_src_filter = +<mcp2518fd_spi.cpp> +<mcp2518fd_can.cpp> +<../examples/loopback/>

[env:two_node]
platform         = ${common.platform}
board            = ${common.board}
framework        = ${common.framework}
monitor_speed    = ${common.monitor_speed}
upload_port      = ${common.upload_port}
build_src_filter = +<mcp2518fd_spi.cpp> +<mcp2518fd_can.cpp> +<../examples/two_node/>

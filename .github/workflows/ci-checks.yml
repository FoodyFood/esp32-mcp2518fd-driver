name: CI Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (native)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-native-${{ hashFiles('tests/unit/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run unit tests
        run: cd tests/unit && pio test -e native

  build-examples:
    name: Build ${{ matrix.example }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        example:
          - single_node
          - id_filter
          - two_node
          - walkie_talkie
          - scope_loopback
          - bus_monitor

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-esp32-${{ matrix.example }}-${{ hashFiles(format('examples/{0}/platformio.ini', matrix.example)) }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Patch lib_deps for CI
        # symlink:// works locally on Windows but causes PlatformIO to copy the
        # entire repo into libdeps on Linux, hitting path length limits.
        # Replace with lib_deps pointing to the checked-out repo root directly.
        run: |
          python3 - examples/${{ matrix.example }}/platformio.ini <<'EOF'
          import re, sys
          path = sys.argv[1]
          txt = open(path).read()
          txt = re.sub(r'lib_deps\s*=\s*symlink://[^\n]+', 'lib_deps = file://../..', txt)
          open(path, 'w').write(txt)
          print(open(path).read())
          EOF

      - name: Build ${{ matrix.example }}
        run: cd examples/${{ matrix.example }} && pio run
